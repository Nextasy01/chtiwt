name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: download modules
        run: go mod download

      - name: vet
        run: go vet ./...

      - name: build
        run: go build -trimpath ./...

      - name: test
        run: go test -race -count=1 ./...

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # We build the image but don't push it. Loading into the local docker
      # daemon catches Dockerfile regressions without requiring a registry.
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: chtiwt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
