{{define "content"}}
<section class="form-card">
  <h1>Log in</h1>
  {{with .Data}}
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="POST" action="/login">
      <label>Username
        <input name="username" value="{{.Username}}" required autocomplete="username">
      </label>
      <label>Password
        <input name="password" type="password" required autocomplete="current-password">
      </label>
      <button type="submit">Log in</button>
    </form>
  {{end}}
  <p class="muted" style="margin-top:1rem;text-align:center">No account yet? <a href="/signup">Sign up</a></p>
</section>
{{end}}
