{{define "content"}}
{{with .Data}}
<section class="watch">
  <div class="watch-grid">
    <div class="watch-main">
      <h1>{{.ChannelName}}</h1>
      {{if .Title}}<p class="muted">{{.Title}}</p>{{end}}

      {{if .Live}}
        <div class="player-wrap">
          <!-- `controls` is kept as a fallback: if Plyr fails to load
               (CDN blocked, JS error), the browser's native controls
               appear instead of a dead black box. Plyr removes the
               attribute when it successfully takes over. -->
          <video id="player" controls autoplay muted playsinline></video>
        </div>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
        <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.polyfilled.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
        <script>
          (function () {
            var video = document.getElementById('player');
            var src = '/hls/{{.ChannelName}}/index.m3u8';

            // Init Plyr FIRST, on the empty <video>. Doing this after
            // hls.attachMedia causes Plyr's setup to call video.load(),
            // which detaches the MediaSource and orphans the blob URL
            // (the "blob: ERR_FILE_NOT_FOUND" symptom).
            if (window.Plyr) {
              new Plyr(video, {
                controls: ['play-large', 'play', 'mute', 'volume', 'fullscreen'],
                // Fullscreen the whole grid so chat stays visible — theater mode.
                fullscreen: { enabled: true, fallback: true, iosNative: false, container: '.watch-grid' },
                clickToPlay: true,
                keyboard: { focused: true, global: false },
                tooltips: { controls: true },
              });
            }

            // Now attach the HLS source. Plyr is already wrapping the
            // controls layer and won't interfere.
            if (window.Hls && Hls.isSupported()) {
              var retryPolicy = {
                maxNumRetry: 8,
                retryDelayMs: 800,
                maxRetryDelayMs: 4000,
              };
              var hls = new Hls({
                // Sit closer to the live edge than hls.js's default (~6 s).
                // 2 s = first usable segment; 6 s = if we fall this far
                // behind for any reason, hls.js auto-seeks forward.
                liveSyncDuration: 2,
                liveMaxLatencyDuration: 6,
                // lowLatencyMode would require #EXT-X-PART markers in the
                // playlist (LL-HLS), which our ffmpeg output doesn't emit.
                manifestLoadPolicy: {
                  default: { maxLoadTimeMs: 20000, timeoutRetry: retryPolicy, errorRetry: retryPolicy },
                },
                playlistLoadPolicy: {
                  default: { maxLoadTimeMs: 20000, timeoutRetry: retryPolicy, errorRetry: retryPolicy },
                },
                fragLoadPolicy: {
                  default: { maxLoadTimeMs: 120000, timeoutRetry: retryPolicy, errorRetry: retryPolicy },
                },
              });
              hls.loadSource(src);
              hls.attachMedia(video);

              // Twitch-style pause-then-resume: if the viewer is more
              // than 4 s behind the live edge when they hit play (the
              // typical "I paused, came back later" case), snap forward
              // to live instead of trying to catch up frame by frame.
              // A short threshold means we don't disturb the initial
              // play (we're already near live) or a quick scrub-pause.
              video.addEventListener('play', function () {
                if (typeof hls.liveSyncPosition !== 'number') return;
                var behind = hls.liveSyncPosition - video.currentTime;
                if (behind > 4) {
                  video.currentTime = hls.liveSyncPosition;
                }
              });

              // Bounded recovery. The previous version called
              // recoverMediaError() on every fatal media error, which
              // turned a single decode failure into an infinite
              // download-flush-redownload loop.
              var mediaRecoveryAttempts = 0;
              hls.on(Hls.Events.ERROR, function (_event, data) {
                if (!data.fatal) return;
                switch (data.type) {
                  case Hls.ErrorTypes.NETWORK_ERROR:
                    hls.startLoad();
                    break;
                  case Hls.ErrorTypes.MEDIA_ERROR:
                    if (mediaRecoveryAttempts === 0) {
                      mediaRecoveryAttempts++;
                      hls.recoverMediaError();
                    } else if (mediaRecoveryAttempts === 1) {
                      mediaRecoveryAttempts++;
                      hls.swapAudioCodec();
                      hls.recoverMediaError();
                    } else {
                      console.warn('hls: gave up after repeated media errors');
                      hls.destroy();
                    }
                    break;
                  default:
                    hls.destroy();
                    break;
                }
              });

              // Defeat the autoplay race: once we have a parsed
              // manifest, explicitly request play. If the browser
              // blocks it (no prior user gesture), Plyr's center
              // play button takes over and the user clicks once.
              hls.on(Hls.Events.MANIFEST_PARSED, function () {
                var p = video.play();
                if (p && typeof p.catch === 'function') {
                  p.catch(function () { /* user gesture required */ });
                }
              });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
              video.src = src;
            } else {
              video.outerHTML = '<p class="error">Your browser cannot play HLS.</p>';
            }
          })();
        </script>
      {{else}}
        <div class="player-wrap offline"><span class="muted">channel is offline</span></div>
      {{end}}
    </div>

    <aside class="chat-pane">
      <header class="chat-header">
        <span>chat</span>
        <span id="viewer-count" class="viewer-count">viewers: 0</span>
      </header>
      <ul id="chat-log" class="chat-log"></ul>
      <form id="chat-form" class="chat-form" {{if not $.User}}data-guest="1"{{end}}>
        {{if $.User}}
          <input id="chat-input" name="body" autocomplete="off" maxlength="500" placeholder="send a message">
          <button type="submit">send</button>
        {{else}}
          <input disabled placeholder="log in to chat">
          <a class="btn-secondary" href="/login">log in</a>
        {{end}}
      </form>
    </aside>
  </div>
</section>

<script>
  (function () {
    var log = document.getElementById('chat-log');
    var form = document.getElementById('chat-form');
    var input = document.getElementById('chat-input');
    var viewerCount = document.getElementById('viewer-count');
    var isGuest = form && form.dataset.guest === '1';

    function escape(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function render(msg) {
      if (msg.type === 'viewers') {
        viewerCount.textContent = 'viewers: ' + (msg.count || 0);
        return;
      }
      var li = document.createElement('li');
      li.className = 'chat-msg chat-' + (msg.type || 'message');
      var when = msg.at ? new Date(msg.at) : new Date();
      var hh = String(when.getHours()).padStart(2, '0');
      var mm = String(when.getMinutes()).padStart(2, '0');
      var time = '<span class="chat-time">' + hh + ':' + mm + '</span>';
      if (msg.type === 'system') {
        li.innerHTML = time + ' <em>' + escape(msg.body) + '</em>';
      } else if (msg.type === 'error') {
        li.innerHTML = time + ' <span class="error-inline">' + escape(msg.body) + '</span>';
      } else {
        li.innerHTML = time + ' <strong>' + escape(msg.user || '?') + ':</strong> ' + escape(msg.body);
      }
      log.appendChild(li);
      log.scrollTop = log.scrollHeight;
    }

    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var ws = new WebSocket(proto + '://' + location.host + '/ws/chat/{{.ChannelName}}');

    ws.onmessage = function (ev) {
      try {
        render(JSON.parse(ev.data));
      } catch (e) {}
    };
    ws.onclose = function () {
      render({ type: 'system', body: 'disconnected' });
    };

    if (!isGuest && form) {
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var body = (input.value || '').trim();
        if (!body || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ body: body }));
        input.value = '';
      });
    }
  })();
</script>
{{end}}
{{end}}
