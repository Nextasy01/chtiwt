{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chtiwt</title>
  <style>
    :root {
      --bg: #0e0e10;
      --panel: #18181b;
      --panel-soft: #1f1f23;
      --border: #2a2a2e;
      --text: #efeff1;
      --muted: #adadb8;
      --accent: #9146ff;
      --accent-hover: #a970ff;
      --danger: #eb0400;
      --error-bg: #3b1418;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .brand { font-weight: 700; font-size: 1.25rem; color: var(--text); }
    .topbar nav { display: flex; align-items: center; gap: 1rem; }
    .topbar nav .me { color: var(--muted); }
    main { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }
    /* The watch page is the only one that wants a wide layout — the
       video player needs the room. :has() lets us bump the cap only
       when the page actually contains a .watch section, leaving the
       forms / dashboard / home grid centered at the narrower default. */
    main:has(.watch) { max-width: min(96vw, 1400px); }
    h1 { margin-top: 0; }
    h2 { margin-top: 2rem; }
    .muted { color: var(--muted); }
    .error {
      background: var(--error-bg);
      border: 1px solid var(--danger);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
    }
    button, .btn {
      background: var(--accent);
      color: var(--text);
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-block;
    }
    button:hover, .btn:hover { background: var(--accent-hover); color: var(--text); }
    button.danger { background: var(--danger); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.55rem 1rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }
    .inline-form { display: inline; }
    .form-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      max-width: 420px;
      margin: 0 auto;
    }
    .form-card label {
      display: block;
      margin: 0.75rem 0;
    }
    .form-card input {
      display: block;
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.5rem 0.75rem;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
    }
    .form-card button { width: 100%; margin-top: 0.5rem; }
    .title-form { display: flex; gap: 0.5rem; }
    .title-form input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    dl.meta { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem; }
    dl.meta dt { color: var(--muted); }
    dl.meta dd { margin: 0; }
    code, pre {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
    }
    pre.key {
      padding: 1rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 1rem;
    }
    .hero { text-align: center; padding: 3rem 0; }
    .hero h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    .key-shown { text-align: center; }
    .live-list h2 { margin-top: 1rem; }
    ul.cards {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .card a {
      display: block;
      color: var(--text);
    }
    .card a:hover .card-channel { color: var(--accent-hover); }
    .card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background:
        repeating-linear-gradient(
          135deg,
          var(--panel-soft) 0 12px,
          var(--panel) 12px 24px
        );
    }
    .live-badge {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: var(--danger);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .card-body { padding: 0.75rem; }
    .card-channel { font-weight: 600; }
    .card-title {
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-wrap {
      margin: 1rem 0;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }
    .player-wrap video { width: 100%; height: 100%; display: block; }
    /* Plyr overrides: match our dark theme + Twitch-y purple accent. */
    .player-wrap .plyr { height: 100%; border-radius: inherit; }
    :root {
      --plyr-color-main: var(--accent);
      --plyr-video-control-color: var(--text);
      --plyr-video-background: #000;
    }
    .player-wrap.offline {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .watch-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1rem;
      /* stretch: the chat sidebar matches the player's height instead
         of carrying its own. Player height comes from the 16:9 wrapper,
         which fills the 1fr column. */
      align-items: stretch;
    }
    @media (max-width: 800px) {
      .watch-grid { grid-template-columns: 1fr; }
      .chat-pane { height: 360px; }
    }
    /* Fullscreen layout: video on the left fills available space, chat
       pinned to the right at fixed width and full height. The grid itself
       fills the screen and ditches the page background padding. */
    .watch-grid:fullscreen {
      width: 100vw;
      height: 100vh;
      gap: 0;
      padding: 0;
      background: var(--bg);
      grid-template-columns: 1fr 340px;
      align-items: stretch;
    }
    .watch-grid:fullscreen .watch-main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .watch-grid:fullscreen .watch-main h1,
    .watch-grid:fullscreen .watch-main > p { display: none; }
    .watch-grid:fullscreen .player-wrap {
      margin: 0;
      flex: 1;
      aspect-ratio: auto;
      border-radius: 0;
    }
    .watch-grid:fullscreen .chat-pane {
      height: 100vh;
      border-radius: 0;
      border-top: none;
      border-bottom: none;
      border-right: none;
    }
    .chat-pane {
      display: flex;
      flex-direction: column;
      /* No fixed height in desktop layout — the grid stretches us to
         match the watch-main column (h1 + title + 16:9 player). */
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      min-height: 0;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .viewer-count {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.85rem;
    }
    .chat-log {
      list-style: none;
      margin: 0;
      padding: 0.5rem 0.75rem;
      flex: 1;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .chat-msg { margin: 0.15rem 0; word-wrap: break-word; }
    .chat-time { color: var(--muted); font-size: 0.75rem; margin-right: 0.25rem; }
    .chat-system { color: var(--muted); }
    .chat-error .error-inline { color: var(--danger); }
    .chat-form {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--border);
    }
    .chat-form input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .chat-form input:disabled { color: var(--muted); }
    .chat-form button {
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
    }
    .chat-form .btn-secondary { margin-left: 0; padding: 0.4rem 0.8rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">chtiwt</a>
    <nav>
      {{if .User}}
        <span class="me">@{{.User.Username}}</span>
        <a href="/dashboard">dashboard</a>
        <form method="POST" action="/logout" class="inline-form">
          <button type="submit" class="btn-secondary">log out</button>
        </form>
      {{else}}
        <a href="/login">log in</a>
        <a href="/signup">sign up</a>
      {{end}}
    </nav>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
