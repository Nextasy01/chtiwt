version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries"
    schema:
      - "migrations/0001_init.up.sql"
    gen:
      go:
        package: "queries"
        out: "internal/store/queries"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        emit_pointers_for_null_types: true
